<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Hax's Story</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<link rel="stylesheet" href="styles.css">

<body>
<div id="login-screen" style="position:fixed; inset:0; background:#0f0f0f; z-index:1000; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:15px;">
  <h2 style="font-size:14px; letter-spacing:0.2em; color:#888; text-transform:uppercase;">Acces Privat</h2>
  <input type="email" id="login-email" placeholder="Email" style="background:#161616; border:1px solid #2a2a2a; color:#fff; padding:10px; border-radius:8px; width:250px; outline:none; font-family:inherit;">
  <input type="password" id="login-pass" placeholder="Parolă" style="background:#161616; border:1px solid #2a2a2a; color:#fff; padding:10px; border-radius:8px; width:250px; outline:none; font-family:inherit;">
  <button onclick="handleLogin()" style="background:#3a7bd5; color:#fff; border:none; padding:10px 25px; border-radius:20px; cursor:pointer; font-family:inherit; font-weight:bold; transition:0.2s;">AUTENTIFICARE</button>
  <div id="login-error" style="color:#e05555; font-size:11px; margin-top:5px;"></div>
</div>
<header>
  <h1>Wire Diagram</h1>
  <div class="hint">
    <span>Click titlu</span> → editează &nbsp;·&nbsp;
    <span>Port</span> → conectează &nbsp;·&nbsp;
    <span>Bulina</span> → mișcă firul &nbsp;·&nbsp;
    <span>✕</span> → șterge
  </div>
  <button class="tool-btn" id="undo-btn" onclick="undo()" style="border:1px solid #2a2a2a; border-radius:20px; padding:5px 14px;">↩ Undo</button>
  <div id="nav-wrap">
    <button id="nav-btn" onclick="toggleNav()">☰ Noduri</button>
    <div id="nav-dropdown"></div>
  </div>
  <div id="save-status">
    <div class="dot"></div>
    <span id="save-label">—</span>
  </div>
</header>

<div id="canvas">
  <div id="loading-overlay">
    <div class="logo">Wire Diagram</div>
    <div class="spinner"></div>
  </div>
  <div id="world">
    <svg id="wires">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#3a7bd5"/>
        </marker>
      </defs>
      <path id="temp-wire" d=""/>
    </svg>
  </div>
</div>

<div id="wire-color-popup">
  <span>Culoare fir</span>
  <input type="color" id="wire-color-input" value="#3a7bd5">
</div>
<div id="toolbar">
  <button class="tool-btn" onclick="addNode()">+ Nod</button>
  <button class="tool-btn danger" onclick="deleteSelected()">✕ Șterge</button>
  <button class="tool-btn" onclick="resetView()">⌂ Vedere</button>

</div>

<script>
// ── Firebase init ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAH5dMgxUM8t7hj45pL4ABHc9NacQayc-A",
  authDomain: "hax-berg-2026.firebaseapp.com",
  projectId: "hax-berg-2026",
  storageBucket: "hax-berg-2026.firebasestorage.app",
  messagingSenderId: "497627197822",
  appId: "1:497627197822:web:9198db6c127511788c832f",
  databaseURL: "https://hax-berg-2026-default-rtdb.europe-west1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let DIAGRAM_REF;

async function handleLogin() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  const errorDiv = document.getElementById('login-error');
  try {
    errorDiv.textContent = "Se verifică...";
    await auth.signInWithEmailAndPassword(email, pass);
    DIAGRAM_REF = db.ref('diagram/v1');
    document.getElementById('login-screen').style.display = 'none';
    loadDiagram();
  } catch (error) {
    errorDiv.textContent = "Date incorecte sau acces refuzat.";
    console.error("Auth error:", error.message);
  }
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') handleLogin();
});

// ── State ──────────────────────────────────────────────────────
const canvas   = document.getElementById('canvas');
const svgEl    = document.getElementById('wires');
const tempWire = document.getElementById('temp-wire');
const overlay  = document.getElementById('loading-overlay');
const world    = document.getElementById('world');

let nodes = [], connections = [];
let selectedId = null, nodeCount = 0;
let draggingNode = null, dragOffset = {x:0, y:0};
let drawingWire = null, draggingHandle = null;
let saveTimeout = null;
let isLoading = true;
let panX = 0, panY = 0, zoom = 1;

// ── Undo stack ────────────────────────────────────────────────
let undoStack = [];
const UNDO_LIMIT = 50;

function snapshotForUndo() {
  if (isLoading) return;
  const state = serializeState();
  undoStack.push(JSON.stringify(state));
  if (undoStack.length > UNDO_LIMIT) undoStack.shift();
}

function undo() {
  if (undoStack.length === 0) return;
  const raw = undoStack.pop();
  const data = JSON.parse(raw);
  // Clear current nodes
  nodes.forEach(n => { const e = document.getElementById(n.id); if (e) e.remove(); });
  nodes = []; connections = []; nodeCount = 0;
  // Restore
  nodeCount = data.nodeCount || 0;
  (data.nodes || []).forEach(n => createNode(n.x, n.y, n.title, n.body, n.id, n.month, n.year, n.w, n.h));
  connections = (data.connections || []).map(c => ({...c, midX: c.midX||undefined, midY: c.midY||undefined}));
  renderWires();
  scheduleAutoSave();
}

function applyTransform() {
  world.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
  world.style.transformOrigin = '0 0';
}
function applyPan() { applyTransform(); }

// ── Pan & Zoom with scroll wheel ──────────────────────────────
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (e.ctrlKey) {
    // Zoom toward mouse cursor
    const cr = canvas.getBoundingClientRect();
    const mx = e.clientX - cr.left;
    const my = e.clientY - cr.top;
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const newZoom = Math.min(3, Math.max(0.2, zoom * delta));
    // Adjust pan so the point under the cursor stays fixed
    panX = mx - (mx - panX) * (newZoom / zoom);
    panY = my - (my - panY) * (newZoom / zoom);
    zoom = newZoom;
  } else if (e.shiftKey) {
    panX -= e.deltaY;
  } else {
    panX -= e.deltaX;
    panY -= e.deltaY;
  }
  applyTransform();
}, { passive: false });

// ── Pan with middle mouse button drag ─────────────────────────
let mmDragging = false, mmLast = {x:0, y:0};
canvas.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  if (e.target !== canvas && e.target !== svgEl && e.target !== world) return;
  e.preventDefault();
  mmDragging = true;
  mmLast = {x: e.clientX, y: e.clientY};
  canvas.style.cursor = 'grabbing';
});
document.addEventListener('mousemove', (e) => {
  if (!mmDragging) return;
  panX += e.clientX - mmLast.x;
  panY += e.clientY - mmLast.y;
  mmLast = {x: e.clientX, y: e.clientY};
  applyPan();
});
document.addEventListener('mouseup', (e) => {
  if (!mmDragging) return;
  mmDragging = false;
  canvas.style.cursor = 'default';
});

// ── Save status UI ─────────────────────────────────────────────
function setStatus(state, text) {
  const el = document.getElementById('save-status');
  const lb = document.getElementById('save-label');
  el.className = state;
  lb.textContent = text;
}

// ── Serialize ─────────────────────────────────────────────────
function serializeState() {
  return {
    nodes: nodes.map(n => {
      const el = document.getElementById(n.id);
      return {
        id:    n.id,
        x:     parseInt(el.style.left),
        y:     parseInt(el.style.top),
        w:     el.offsetWidth,
        h:     el.offsetHeight,
        title: el.querySelector('.node-title').textContent,
        body:  el.querySelector('.node-body').textContent,
        month: el.querySelector('.node-month').value,
        year:  el.querySelector('.node-year').value,
        color: el.dataset.color || ''
      };
    }),
    connections: connections.map(c => ({...c})),
    nodeCount,
    panX, panY, zoom
  };
}

function scheduleAutoSave() {
  if (isLoading) return;
  setStatus('saving', 'Se salvează...');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    try {
      await DIAGRAM_REF.set(serializeState());
      setStatus('saved', 'Salvat ✓');
    } catch(e) {
      setStatus('error', 'Eroare salvare');
      console.error(e);
    }
  }, 800);
}

// ── Load from Firebase ─────────────────────────────────────────
async function loadDiagram() {
  try {
    const snap = await DIAGRAM_REF.get();
    if (snap.exists()) {
      const data = snap.val();
      nodeCount = data.nodeCount || 0;
      panX = data.panX || 0; panY = data.panY || 0; zoom = data.zoom || 1;
      applyTransform();
      (data.nodes || []).forEach(n => {
        createNode(n.x, n.y, n.title, n.body, n.id, n.month, n.year, n.w, n.h, n.color);
      });
      connections = (data.connections || []).map(c => ({...c, midX: c.midX||undefined, midY: c.midY||undefined}));
      renderWires();
      resetView();
      setStatus('saved', 'Salvat ✓');
    } else {
      initDefaultDiagram();
    }
  } catch(e) {
    setStatus('error', 'Eroare încărcare');
    console.error(e);
    initDefaultDiagram();
  } finally {
    isLoading = false;
    overlay.style.opacity = '0';
    setTimeout(() => overlay.style.display = 'none', 400);
  }
}

// ── Rendering ──────────────────────────────────────────────────
function getPortPos(nodeEl, side) {
  const r  = nodeEl.getBoundingClientRect();
  const wr = world.getBoundingClientRect();
  const cx = (r.left - wr.left + r.width  / 2) / zoom;
  const cy = (r.top  - wr.top  + r.height / 2) / zoom;
  if (side === 'right')  return {x: (r.right  - wr.left) / zoom, y: cy};
  if (side === 'left')   return {x: (r.left   - wr.left) / zoom, y: cy};
  if (side === 'bottom') return {x: cx, y: (r.bottom - wr.top) / zoom};
  if (side === 'top')    return {x: cx, y: (r.top    - wr.top) / zoom};
  return {x: cx, y: cy};
}

function qPath(x1, y1, x2, y2, mx, my) {
  if (mx !== undefined) return `M${x1},${y1} Q${mx},${my} ${x2},${y2}`;
  const dx = Math.abs(x2 - x1) * 0.5;
  return `M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`;
}

function renderWires() {
  svgEl.querySelectorAll('.wire-group').forEach(e => e.remove());
  connections.forEach(conn => {
    const fe = document.getElementById(conn.from);
    const te = document.getElementById(conn.to);
    if (!fe || !te) return;
    const p1 = getPortPos(fe, conn.fromPort || 'right');
    const p2 = getPortPos(te, conn.toPort   || 'left');
    if (conn.midX === undefined) { conn.midX = (p1.x+p2.x)/2; conn.midY = (p1.y+p2.y)/2; }

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.classList.add('wire-group');
    if (selectedId === conn.id) g.classList.add('selected');

    const wireColor = conn.color || '#3a7bd5';
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', qPath(p1.x, p1.y, p2.x, p2.y, conn.midX, conn.midY));
    path.setAttribute('class', 'wire');
    if (selectedId === conn.id) path.classList.add('selected');
    else path.style.stroke = wireColor;
    path.setAttribute('marker-end', 'url(#arrow)');
    path.addEventListener('click', (e) => {
      e.stopPropagation(); selectedId = conn.id; renderWires();
      // Show color popup at screen position
      const cr = canvas.getBoundingClientRect();
      const wr = world.getBoundingClientRect();
      showWireColorPopup(conn.id,
        wr.left + conn.midX * zoom + 20,
        wr.top  + conn.midY * zoom
      );
    });

    const handle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    handle.setAttribute('cx', conn.midX); handle.setAttribute('cy', conn.midY);
    handle.setAttribute('r', selectedId === conn.id ? 7 : 5);
    handle.setAttribute('class', 'wire-handle');
    if (selectedId !== conn.id) handle.style.fill = wireColor;
    if (selectedId === conn.id) handle.classList.add('selected');
    handle.addEventListener('mousedown', (e) => {
      e.stopPropagation(); selectedId = conn.id;
      draggingHandle = {connId: conn.id}; renderWires();
    });

    const dbx = conn.midX + 18, dby = conn.midY - 18;
    const dbg = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dbg.setAttribute('cx', dbx); dbg.setAttribute('cy', dby); dbg.setAttribute('r', 9);
    dbg.setAttribute('class', 'wire-del-bg');
    dbg.addEventListener('click', (e) => { e.stopPropagation(); deleteConn(conn.id); });

    const dtxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    dtxt.setAttribute('x', dbx); dtxt.setAttribute('y', dby);
    dtxt.setAttribute('class', 'wire-del-txt'); dtxt.textContent = '✕';
    dtxt.addEventListener('click', (e) => { e.stopPropagation(); deleteConn(conn.id); });

    g.appendChild(path); g.appendChild(handle); g.appendChild(dbg); g.appendChild(dtxt);
    svgEl.appendChild(g);
  });
}

// ── Node color helper ─────────────────────────────────────────
function applyNodeColor(el, color) {
  const isDefault = !color || color === '#2e2e2e';
  el.style.borderColor = isDefault ? '' : color + '88';
  el.style.setProperty('--node-accent', isDefault ? '#222' : color + '44');
  const header = el.querySelector('.node-header');
  if (header) header.style.borderBottomColor = isDefault ? '' : color + '66';
}

// ── Wire color popup ───────────────────────────────────────────
const wireColorPopup = document.getElementById('wire-color-popup');
const wireColorInput = document.getElementById('wire-color-input');

function showWireColorPopup(connId, cx, cy) {
  const conn = connections.find(c => c.id === connId);
  if (!conn) return;
  wireColorInput.value = conn.color || '#3a7bd5';
  wireColorPopup.style.left = cx + 'px';
  wireColorPopup.style.top  = (cy - 60) + 'px';
  wireColorPopup.classList.add('show');
  wireColorInput.oninput = (e) => {
    conn.color = e.target.value;
    renderWires();
    scheduleAutoSave();
  };
}

function hideWireColorPopup() {
  wireColorPopup.classList.remove('show');
}

document.addEventListener('click', (e) => {
  if (!wireColorPopup.contains(e.target)) hideWireColorPopup();
});

// ── Node creation ──────────────────────────────────────────────
const MONTHS = ["Ian","Feb","Mar","Apr","Mai","Iun","Iul","Aug","Sep","Oct","Noi","Dec"];

function createNode(x, y, title, body, forcedId, savedMonth, savedYear, w, h, savedColor) {
  if (!forcedId) nodeCount++;
  const id = forcedId || ('node-' + nodeCount);

  const el = document.createElement('div');
  el.className = 'node';
  el.id = id;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  if (w) el.style.width  = w + 'px';
  if (h) el.style.height = h + 'px';
  const nodeColor = savedColor || '#2e2e2e';
  el.dataset.color = nodeColor;
  applyNodeColor(el, nodeColor);

  // Re-render wires & save on resize
  const observer = new ResizeObserver(() => {
    renderWires();
    scheduleAutoSave();
  });
  observer.observe(el);

  // ── Header ──
  const header = document.createElement('div');
  header.className = 'node-header';

  const titleEl = document.createElement('div');
  titleEl.className = 'node-title';
  titleEl.contentEditable = 'true';
  titleEl.spellcheck = false;
  titleEl.textContent = title || ('Block ' + (forcedId ? forcedId.split('-')[1] : nodeCount));
  titleEl.addEventListener('mousedown', e => e.stopPropagation());
  titleEl.addEventListener('blur', scheduleAutoSave);

  // ── Delete button ──
  const delBtn = document.createElement('div');
  delBtn.className = 'node-delete'; delBtn.innerHTML = '✕';
  delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteNode(id); });

  // ── Color swatch ──
  const colorBtn = document.createElement('div');
  colorBtn.className = 'node-color-btn';
  colorBtn.style.background = nodeColor === '#2e2e2e' ? '#2e2e2e' : nodeColor;
  const colorInput = document.createElement('input');
  colorInput.type = 'color';
  colorInput.value = nodeColor === '#2e2e2e' ? '#3a7bd5' : nodeColor;
  colorInput.addEventListener('input', (e) => {
    e.stopPropagation();
    const c = e.target.value;
    el.dataset.color = c;
    colorBtn.style.background = c;
    applyNodeColor(el, c);
    scheduleAutoSave();
  });
  colorInput.addEventListener('mousedown', e => e.stopPropagation());
  colorBtn.appendChild(colorInput);

  header.appendChild(titleEl);
  header.appendChild(colorBtn);
  header.appendChild(delBtn);

  // ── Body ──
  const bodyEl = document.createElement('div');
  bodyEl.className = 'node-body';
  bodyEl.contentEditable = 'true';
  bodyEl.spellcheck = false;
  bodyEl.setAttribute('data-placeholder', 'Descriere...');
  bodyEl.textContent = body || '';
  bodyEl.addEventListener('mousedown', e => e.stopPropagation());
  bodyEl.addEventListener('blur', scheduleAutoSave);

  // ── Date footer ──
  const dateWrap = document.createElement('div');
  dateWrap.className = 'node-date-wrap';

  const dateLabel = document.createElement('span');
  dateLabel.className = 'node-date-label';
  dateLabel.textContent = 'Data';

  const selMonth = document.createElement('select');
  selMonth.className = 'node-month';
  MONTHS.forEach((m, i) => {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = m;
    if (savedMonth !== undefined && savedMonth != null && String(savedMonth) === String(i)) opt.selected = true;
    selMonth.appendChild(opt);
  });

  const selYear = document.createElement('select');
  selYear.className = 'node-year';
  for (let y = 2011; y <= 2030; y++) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    if (savedYear != null && String(savedYear) === String(y)) opt.selected = true;
    selYear.appendChild(opt);
  }

  selMonth.onchange = scheduleAutoSave;
  selYear.onchange  = scheduleAutoSave;
  selMonth.onmousedown = e => e.stopPropagation();
  selYear.onmousedown  = e => e.stopPropagation();

  dateWrap.appendChild(dateLabel);
  dateWrap.appendChild(selMonth);
  dateWrap.appendChild(selYear);

  el.appendChild(header);
  el.appendChild(bodyEl);
  el.appendChild(dateWrap);

  // ── Ports ──
  [['port port-right','right'],['port port-left','left'],['port port-bottom','bottom'],['port port-top','top']]
    .forEach(([cls, side]) => {
      const port = document.createElement('div');
      port.className = cls; port.dataset.side = side;
      port.addEventListener('mousedown', (e) => {
        e.stopPropagation();
        const pos = getPortPos(el, side);
        drawingWire = {fromNodeId: id, fromPort: side, startX: pos.x, startY: pos.y};
        port.classList.add('active');
      });
      el.appendChild(port);
    });

  // ── Drag to move (skip resize corner, ports, editable areas) ──
  el.addEventListener('mousedown', (e) => {
    const skipClasses = ['port','node-body','node-title','node-delete','node-month','node-year','node-color-btn'];
    if (skipClasses.some(c => e.target.classList.contains(c))) return;

    // Resize zone = bottom-right 16px
    const rect = el.getBoundingClientRect();
    if (e.clientX > rect.right - 16 && e.clientY > rect.bottom - 16) return;

    draggingNode = el;
    dragOffset.x = e.clientX - el.offsetLeft;
    dragOffset.y = e.clientY - el.offsetTop;
    el.classList.add('dragging');
    selectedId = null;
    document.querySelectorAll('.node.selected').forEach(n => n.classList.remove('selected'));
    el.classList.add('selected');
    renderWires();
    e.preventDefault();
  });

  world.appendChild(el);
  nodes.push({id, el});
  return id;
}

function addNode() {
  snapshotForUndo();
  createNode(80 + Math.random()*320, 80 + Math.random()*220, '', '');
  scheduleAutoSave();
}

function deleteConn(id) {
  snapshotForUndo();
  connections = connections.filter(c => c.id !== id);
  if (selectedId === id) selectedId = null;
  renderWires(); scheduleAutoSave();
}

function deleteNode(nodeId) {
  snapshotForUndo();
  const el = document.getElementById(nodeId);
  if (el) el.remove();
  nodes = nodes.filter(n => n.id !== nodeId);
  connections = connections.filter(c => c.from !== nodeId && c.to !== nodeId);
  if (selectedId === nodeId) selectedId = null;
  renderWires(); scheduleAutoSave();
}

function deleteSelected() {
  if (!selectedId) return;
  if (connections.find(c => c.id === selectedId)) { deleteConn(selectedId); return; }
  if (nodes.find(n => n.id === selectedId)) deleteNode(selectedId);
}

async function clearAll() {
  if (!confirm('⚠️ Ești sigur că vrei să ștergi TOT? Această acțiune nu poate fi anulată!')) return;
  nodes.forEach(n => { const e = document.getElementById(n.id); if (e) e.remove(); });
  nodes = []; connections = []; selectedId = null; nodeCount = 0;
  renderWires();
  await DIAGRAM_REF.remove();
  initDefaultDiagram();
}

// ── Mouse events ───────────────────────────────────────────────
document.addEventListener('mousemove', (e) => {
  const wr = world.getBoundingClientRect();
  const mx = (e.clientX - wr.left) / zoom, my = (e.clientY - wr.top) / zoom;
  if (draggingNode) {
    draggingNode.style.left = (e.clientX - dragOffset.x) + 'px';
    draggingNode.style.top  = (e.clientY - dragOffset.y) + 'px';
    renderWires();
  }
  if (drawingWire) tempWire.setAttribute('d', qPath(drawingWire.startX, drawingWire.startY, mx, my));
  if (draggingHandle) {
    const conn = connections.find(c => c.id === draggingHandle.connId);
    if (conn) { conn.midX = mx; conn.midY = my; renderWires(); }
  }
});

document.addEventListener('mouseup', (e) => {
  if (draggingNode) { draggingNode.classList.remove('dragging'); draggingNode = null; renderWires(); scheduleAutoSave(); }
  if (draggingHandle) { draggingHandle = null; scheduleAutoSave(); }
  if (drawingWire) {
    const t = e.target;
    if (t.classList.contains('port')) {
      const toNode = t.closest('.node');
      if (toNode && toNode.id !== drawingWire.fromNodeId) {
        snapshotForUndo();
        connections.push({id: 'c'+Date.now(), from: drawingWire.fromNodeId, fromPort: drawingWire.fromPort,
          to: toNode.id, toPort: t.dataset.side, midX: undefined, midY: undefined});
        renderWires(); scheduleAutoSave();
      }
    }
    tempWire.setAttribute('d', '');
    document.querySelectorAll('.port.active').forEach(p => p.classList.remove('active'));
    drawingWire = null;
  }
});

document.addEventListener('keydown', (e) => {
  if ((e.key === 'z' || e.key === 'Z') && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    undo();
    return;
  }
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedId) {
    const a = document.activeElement;
    if (a && (a.classList.contains('node-body') || a.classList.contains('node-title'))) return;
    deleteSelected();
  }
});

canvas.addEventListener('click', (e) => {
  if (e.target === canvas || e.target === svgEl || e.target === world) {
    selectedId = null;
    document.querySelectorAll('.node.selected').forEach(n => n.classList.remove('selected'));
    renderWires();
  }
});


// ── Node Navigator ────────────────────────────────────────────
function toggleNav() {
  const btn = document.getElementById('nav-btn');
  const dd  = document.getElementById('nav-dropdown');
  const open = dd.classList.toggle('open');
  btn.classList.toggle('open', open);
  if (open) populateNav();
}

function populateNav() {
  const dd = document.getElementById('nav-dropdown');
  dd.innerHTML = '';
  if (nodes.length === 0) {
    dd.innerHTML = '<div class="nav-empty">Niciun nod activ</div>';
    return;
  }
  nodes.forEach(n => {
    const el = document.getElementById(n.id);
    if (!el) return;
    const title = el.querySelector('.node-title').textContent.trim() || '(fără titlu)';
    const item = document.createElement('div');
    item.className = 'nav-item';
    item.innerHTML = `<span class="nav-dot"></span><span>${title}</span>`;
    item.addEventListener('click', () => {
      // Close dropdown
      document.getElementById('nav-dropdown').classList.remove('open');
      document.getElementById('nav-btn').classList.remove('open');
      // Navigate: center the node in the canvas
      const cr = canvas.getBoundingClientRect();
      const nx = parseInt(el.style.left) + el.offsetWidth  / 2;
      const ny = parseInt(el.style.top)  + el.offsetHeight / 2;
      panX = cr.width  / 2 - nx * zoom;
      panY = cr.height / 2 - ny * zoom;
      applyTransform();
      // Highlight
      document.querySelectorAll('.node.selected').forEach(n => n.classList.remove('selected'));
      el.classList.add('selected');
      selectedId = n.id;
      renderWires();
    });
    dd.appendChild(item);
  });
}

// Close nav when clicking outside
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('nav-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('nav-dropdown').classList.remove('open');
    document.getElementById('nav-btn').classList.remove('open');
  }
});

// ── Reset View — fit all nodes in canvas ──────────────────────
function resetView() {
  if (nodes.length === 0) { panX = 0; panY = 0; zoom = 1; applyTransform(); return; }
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    const el = document.getElementById(n.id);
    if (!el) return;
    const x = parseInt(el.style.left) || 0;
    const y = parseInt(el.style.top)  || 0;
    const w = el.offsetWidth  || 200;
    const h = el.offsetHeight || 160;
    minX = Math.min(minX, x);
    minY = Math.min(minY, y);
    maxX = Math.max(maxX, x + w);
    maxY = Math.max(maxY, y + h);
  });
  const pad = 60;
  const cr  = canvas.getBoundingClientRect();
  const scaleX = (cr.width  - pad*2) / (maxX - minX || 1);
  const scaleY = (cr.height - pad*2) / (maxY - minY || 1);
  zoom = Math.min(1, scaleX, scaleY);
  panX = pad - minX * zoom + (cr.width  - pad*2 - (maxX - minX) * zoom) / 2;
  panY = pad - minY * zoom + (cr.height - pad*2 - (maxY - minY) * zoom) / 2;
  applyTransform();
}

// ── Default diagram ────────────────────────────────────────────
function initDefaultDiagram() {
  const n1 = createNode(60,  130, 'Start',     '');
  const n2 = createNode(290,  60, 'Procesare', '');
  const n3 = createNode(290, 255, 'Validare',  '');
  const n4 = createNode(80,  415, 'Output',    '');
  setTimeout(() => {
    connections.push({id:'c1', from:n1, fromPort:'right',  to:n2, toPort:'left',   midX:undefined, midY:undefined});
    connections.push({id:'c2', from:n2, fromPort:'bottom', to:n3, toPort:'top',    midX:undefined, midY:undefined});
    connections.push({id:'c3', from:n3, fromPort:'bottom', to:n4, toPort:'right',  midX:undefined, midY:undefined});
    renderWires();
    scheduleAutoSave();
  }, 50);
}
